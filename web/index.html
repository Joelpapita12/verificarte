<body>
  <script>
    (function () {
      function showCaptureWarning() {
        let node = document.getElementById('capture-warning');
        if (!node) {
          node = document.createElement('div');
          node.id = 'capture-warning';
          node.style.position = 'fixed';
          node.style.left = '50%';
          node.style.bottom = '24px';
          node.style.transform = 'translateX(-50%)';
          node.style.background = '#081f3f';
          node.style.color = '#fff';
          node.style.padding = '12px 18px';
          node.style.borderRadius = '12px';
          node.style.fontFamily = 'Arial, sans-serif';
          node.style.fontSize = '14px';
          node.style.zIndex = '2147483647';
          node.style.boxShadow = '0 10px 30px rgba(0,0,0,.35)';
          node.style.opacity = '0';
          node.style.transition = 'opacity .15s ease';
          document.body.appendChild(node);
        }
        node.textContent = 'Se detectó una captura';
        node.style.opacity = '1';
        clearTimeout(window.__capWarnTimer);
        window.__capWarnTimer = setTimeout(() => {
          node.style.opacity = '0';
        }, 2200);
      }

      window.addEventListener('keydown', (e) => {
        if (e.key === 'PrintScreen' || e.code === 'PrintScreen') {
          showCaptureWarning();
        }
      });
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
